ai_usage_summary: |
  Used Gemini as an agentic AI assistant to analyze the job description, 
  design the multi-agent NEXUS pipeline, write the code, and optimize the 
  ranking logic based on the hackathon scoring formula. No candidate data 
  was fed to the LLM during runtime (all inference is local).

methodology_summary: |
  NEXUS is a multi-agent system. Stage 1: FlashText and FastEmbed pre-filter candidates.
  Stage 2: 5 specialized agents (Advocate, Skeptic, Forensic, Trajectory, Availability) 
  evaluate candidates using localized rules derived directly from the JD. 
  Stage 3: Agents undergo adversarial debate to resolve conflicting evidence.
  Stage 4: Bayesian belief fusion computes an LCB (Lower Confidence Bound) score, 
  which is modified by a behavioral availability multiplier. 
  Finally, scores are normalized via percentile-based mapping to ensure proper 
  differentiation in the top 100.

